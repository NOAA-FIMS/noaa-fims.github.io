name: Accessibility Audit

# Trigger this on Pull Requests against main, and allow manual runs
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  accessibility-audit:
    runs-on: ubuntu-latest
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      # Setup R and Quarto exactly like your deployment workflow
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages:
            any::knitr
            any::rmarkdown

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto Project
        uses: quarto-dev/quarto-actions/render@v2
        with:
          to: html

      - name: Run Accessibility Audit
        continue-on-error: true
        id: a11y_audit
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "false"
        run: |
          # Install serve, pa11y-ci, and the HTML reporter
          npm install -g serve wait-on pa11y-ci pa11y-ci-reporter-html
          
          # Serve the site locally
          serve -p 3000 _site &
          wait-on http://localhost:3000
          
          # Generate URLs for all generated HTML files
          find _site -name "*.html" | sed 's|^_site/|http://localhost:3000/|' > local-urls.txt
          
          # Create pa11y config (Notice everything is nested inside "defaults")
          cat > .pa11yci.json << 'EOF'
          {
            "defaults": {
              "runners": [
                "axe",
                "htmlcs"
              ],
              "reporters": [
                "cli",
                ["pa11y-ci-reporter-html", {
                  "destination": "./a11y-reports",
                  "includeZeroIssues": true
                }]
              ],
              "chromeLaunchConfig": {
                "args": [
                  "--no-sandbox",
                  "--disable-setuid-sandbox",
                  "--disable-gpu"
                ],
                "ignoreHTTPSErrors": true
              }
            }
          }
          EOF
          
          # Run Pa11y. This single command prints to the Actions console AND generates the HTML folder.
          pa11y-ci --config .pa11yci.json $(cat local-urls.txt)

      - name: Upload Accessibility Report
        uses: actions/upload-artifact@v4
        with:
          name: Accessibility-HTML-Report
          # Upload the ENTIRE folder, not just a single file
          path: a11y-reports/
          retention-days: 14

      - name: Fail workflow if audit failed
        if: steps.a11y_audit.outcome == 'failure'
        run: |
          echo "Accessibility violations found. Please download the 'Accessibility-HTML-Report' artifact, extract the ZIP, and open 'index.html' in your web browser for a detailed breakdown."
          exit 1
          