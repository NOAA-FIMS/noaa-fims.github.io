name: Contributors list
# This workflow automatically updates the Contributors grid in contact/contributors.qmd
# It fetches contributors from the NOAA-FIMS/FIMS repository and generates an avatar grid
# 
# IMPORTANT: This workflow uses explicit markers to preserve all content in contributors.qmd
# Only the content between these markers is updated:
#   <!-- BEGIN AUTO CONTRIBUTORS GRID -->
#   <!-- END AUTO CONTRIBUTORS GRID -->
# 
# All other content in the file (headers, manual sections, formatting) is preserved exactly as-is.
#
# BEHAVIOR:
#   - On push to main: Updates the grid and commits changes to contributors.qmd if content changed
#   - On pull_request: Validates the workflow but does not commit/push changes
#   - Fails if the marker block is missing from contributors.qmd
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  contrib-qmd-job:
    runs-on: ubuntu-latest
    name: A job to fetch contribs from NOAA-FIMS/FIMS
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pull any changes (useful when there is an auto PR)
        if: github.event_name == 'push'
        run: git pull --rebase origin main

      - name: Fetch contributors from NOAA-FIMS/FIMS and update avatar grid
        uses: actions/github-script@v7
        with:
          script: |
            // Fetch all contributors from NOAA-FIMS/FIMS repository
            const owner = 'NOAA-FIMS';
            const repo = 'FIMS';
            const per_page = 100;
            let page = 1;
            let contributors = [];
            while (true) {
              const res = await github.rest.repos.listContributors({
                owner,
                repo,
                per_page,
                page,
              });
              contributors = contributors.concat(res.data);
              if (res.data.length < per_page) break;
              page++;
            }

            // Generate Contributors grid with avatars and usernames (no header)
            const imageSize = 80;
            let contributorsGrid = '<table><tr>';
            let count = 0;
            for (const c of contributors) {
              contributorsGrid += `<td align="center" valign="top" style="padding:12px"><a href="${c.html_url}"><img src="${c.avatar_url}" width="${imageSize}" alt="${c.login}" style="border-radius:8px"/><br/><sub>${c.login}</sub></a></td>`;
              count++;
              if (count % 6 === 0 && count < contributors.length) contributorsGrid += '</tr><tr>';
            }
            contributorsGrid += '</tr></table>';

            const fs = require('fs');
            const filePath = 'contact/contributors.qmd';
            
            // Read the existing file
            if (!fs.existsSync(filePath)) {
              core.setFailed(`File ${filePath} does not exist. Please create it with the required marker block.`);
              return;
            }
            
            const existingContent = fs.readFileSync(filePath, 'utf8');
            
            // Check for required markers
            const beginMarker = '<!-- BEGIN AUTO CONTRIBUTORS GRID -->';
            const endMarker = '<!-- END AUTO CONTRIBUTORS GRID -->';
            
            if (!existingContent.includes(beginMarker) || !existingContent.includes(endMarker)) {
              core.setFailed(
                `Missing required markers in ${filePath}.\n` +
                `Please add the following markers around the contributors grid:\n` +
                `  ${beginMarker}\n` +
                `  ${endMarker}\n\n` +
                `Example:\n` +
                `## Contributors\n\n` +
                `${beginMarker}\n` +
                `<table>...</table>\n` +
                `${endMarker}`
              );
              return;
            }
            
            // Extract content before and after markers
            const beginIndex = existingContent.indexOf(beginMarker);
            const endIndex = existingContent.indexOf(endMarker);
            
            if (beginIndex >= endIndex) {
              core.setFailed(`Markers are in wrong order in ${filePath}. BEGIN marker must come before END marker.`);
              return;
            }
            
            const beforeMarker = existingContent.substring(0, beginIndex + beginMarker.length);
            const afterMarker = existingContent.substring(endIndex);
            
            // Construct new content: before + newline + grid + newline + after
            const finalContent = beforeMarker + '\n' + contributorsGrid + '\n' + afterMarker;
            
            fs.writeFileSync(filePath, finalContent);

      - name: Commit and push if contributors.qmd changed
        if: github.event_name == 'push'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add contact/contributors.qmd
          git diff --cached --quiet || git commit -m "Update contributors list"
          git pull --rebase origin main
          git push