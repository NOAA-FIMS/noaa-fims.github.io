on:
  push:
    branches-ignore:
      - main
      - gh-pages
  workflow_dispatch:

concurrency:
  group: preview-${{ github.ref_name }}
  cancel-in-progress: true

name: Render Preview

jobs:
  build-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages:
            any::knitr
            any::rmarkdown
            any::ical
            any::lubridate
            any::dplyr
            any::glue

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Make safe branch name
        id: vars
        run: |
          SAFE_BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's#[^A-Za-z0-9._-]#-#g')
          echo "safe_branch=$SAFE_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Override site-url for preview
        run: |
          sed -i 's|site-url: "https://noaa-fims.github.io"|site-url: "https://noaa-fims.github.io/preview/${{ steps.vars.outputs.safe_branch }}"|' _quarto.yml

      - name: Render Quarto Project
        uses: quarto-dev/quarto-actions/render@v2
        with:
          to: html
        env:
          PREVIEW_MODE: "true"
          SAFE_BRANCH: ${{ steps.vars.outputs.safe_branch }}

      - name: Build additive preview deploy tree
        run: |
          set -euo pipefail

          SAFE_BRANCH="${{ steps.vars.outputs.safe_branch }}"
          STAGE="$(mktemp -d)"
          WT="$(mktemp -d)"
          trap 'rm -rf "$STAGE" "$WT"' EXIT

          git fetch origin gh-pages --depth=1 || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add "$WT" origin/gh-pages
            rsync -a --exclude='.git' "$WT/" "$STAGE/"
            git worktree remove "$WT" --force
          fi

          rm -rf "$STAGE/preview/$SAFE_BRANCH"
          mkdir -p "$STAGE/preview/$SAFE_BRANCH"
          cp -a _site/. "$STAGE/preview/$SAFE_BRANCH/"

          rm -rf _site
          mkdir -p _site
          cp -a "$STAGE/." _site/
          
      - name: Publish preview to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
